services:
  db:
    image: mysql:8.0
    container_name: passwordsecurity-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-A123456a@@}
      MYSQL_DATABASE: ${DB_NAME:-password_security}
      MYSQL_INITDB_SKIP_TZINFO: "1"
    # Giảm RAM cho Docker Desktop; tránh OOM khi khởi tạo InnoDB lần đầu (đặc biệt trên macOS).
    command:
      - --performance-schema=OFF
      - --innodb-buffer-pool-size=64M
      - --innodb-log-buffer-size=1M
      - --innodb-redo-log-capacity=32M
      - --max-connections=20
      - --table-open-cache=64
      - --skip-log-bin
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      # Dùng MYSQL_ROOT_PASSWORD trong container — tránh lỗi ký tự đặc biệt (@) trong -p.
      # Interval dài để không gây thêm áp lực RAM khi MySQL đang initialize lần đầu.
      test: ["CMD-SHELL", "MYSQL_PWD=\"$$MYSQL_ROOT_PASSWORD\" mysqladmin ping -h 127.0.0.1 -uroot --silent || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 600s
    ports:
      - "3307:3306"

  # Service migrate: import dữ liệu host → DB Docker.
  # Trên macOS: chạy `bash scripts/docker_compose_up.sh` để export host:3306 ra docker-migrate/seed.sql trước.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: passwordsecurity-migrate
    depends_on:
      db:
        condition: service_started
    volumes:
      # File seed.sql do scripts/export_host_mysql.sh tạo trên máy host
      - ./docker-migrate:/migrate:ro
    environment:
      AUTO_MIGRATE_FROM_HOST: ${AUTO_MIGRATE_FROM_HOST:-1}
      MIGRATE_SQL_FILE: /migrate/seed.sql
      MIGRATE_META_FILE: /migrate/meta.env
      MIGRATE_SOURCE_HOST: ${MIGRATE_SOURCE_HOST:-127.0.0.1}
      MIGRATE_SOURCE_PORT: ${MIGRATE_SOURCE_PORT:-3306}
      MIGRATE_FORCE: ${MIGRATE_FORCE:-0}
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-A123456a@@}
      DB_NAME: ${DB_NAME:-password_security}
    entrypoint: ["python", "/app/scripts/migrate_host_mysql.py"]
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: passwordsecurity-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    ports:
      - "8501:8501"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DB_HOST: ${APP_DB_HOST:-db}
      DB_PORT: ${APP_DB_PORT:-3306}
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-A123456a@@}
      DB_NAME: ${DB_NAME:-password_security}
      MASTER_KEY: ${MASTER_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health')\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  db_data: