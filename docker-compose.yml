services:
  db:
    image: mysql:8.0
    container_name: passwordsecurity-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-A123456a@@}
      MYSQL_DATABASE: ${DB_NAME:-password_security}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysql -h localhost -uroot -p${DB_PASSWORD:-A123456a@@} -e 'SELECT 1' > /dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 15
      start_period: 30s
    ports:
      - "3307:3306"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: passwordsecurity-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8501:8501"
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-A123456a@@}
      DB_NAME: ${DB_NAME:-password_security}
      MASTER_KEY: ${MASTER_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health')\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  db_data: